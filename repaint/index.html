<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Monochrome Bloom</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #000; font-family: 'Courier New', monospace;
    cursor: none;
  }
  #canvas-container { width: 100vw; height: 100vh; }

  #crosshair {
    position: fixed; top: 50%; left: 50%;
    width: 8px; height: 8px;
    margin: -4px 0 0 -4px;
    pointer-events: none; z-index: 50;
  }
  #crosshair .dot {
    position: absolute; top: 50%; left: 50%; width: 5px; height: 5px;
    background: rgba(255,255,255,0.75); border-radius: 50%; margin: -2px 0 0 -2px;
    box-shadow: 0 0 4px rgba(0,0,0,0.9);
    transition: width 0.12s, height 0.12s, margin 0.12s, background 0.12s;
  }
  #crosshair .dot.inreach {
    width: 8px; height: 8px; margin: -4px 0 0 -4px;
    background: rgba(255,255,255,1);
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
  }
  #crosshair .dot.far {
    width: 4px; height: 4px; margin: -2px 0 0 -2px;
    background: rgba(255,255,255,0.3);
  }

  #reach-hint {
    position: fixed; top: 57%; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.9); font-size: 12px; letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0,0,0,1); opacity: 0; transition: opacity 0.25s;
    z-index: 45; pointer-events: none; white-space: nowrap;
  }

  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(20,20,20,0.92) 0%, rgba(0,0,0,0.97) 100%);
    color: #eee; z-index: 100; text-align: center; padding: 20px; cursor: pointer;
  }
  #overlay h1 {
    font-size: 42px; letter-spacing: 4px; margin: 0 0 6px;
    font-weight: 300; text-transform: uppercase;
    background: linear-gradient(90deg, #888, #fff, #888);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  #overlay p { font-size: 13px; color: #999; line-height: 1.8; margin: 4px 0; }
  #overlay .key { color: #ddd; border: 1px solid #555; padding: 1px 7px; border-radius: 3px; font-size: 12px; }
  #overlay .start { margin-top: 24px; font-size: 14px; color: #ccc; letter-spacing: 2px; border: 1px solid #777; padding: 10px 28px; border-radius: 2px; }
  #overlay .start:hover { background: rgba(255,255,255,0.08); }

  #hud {
    position: fixed; top: 18px; left: 18px; z-index: 40;
    color: rgba(255,255,255,0.75); font-size: 11px; letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(0,0,0,0.9); line-height: 1.7;
  }
  #hud .toolname { font-size: 13px; color: #fff; }
  #hud .tooldesc { font-size: 10px; color: rgba(255,255,255,0.55); }
  #toolbar {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    z-index: 40; display: flex; gap: 14px;
  }
  .tool-wrap { text-align: center; }
  .tool-slot {
    width: 46px; height: 46px; border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: rgba(255,255,255,0.6); border-radius: 3px; margin: 0 auto;
  }
  .tool-slot.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.12); }
  .tool-cap {
    margin-top: 4px; font-size: 9px; color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px; line-height: 1.4; text-shadow: 0 0 4px #000;
  }

  #debug-panel {
    position: fixed; top: 18px; right: 18px; z-index: 40;
    font-size: 10px; color: rgba(255,255,255,0.4); text-align: right;
  }
  #debug-panel button {
    margin-top: 6px; font-size: 10px; background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2);
    padding: 4px 8px; cursor: pointer; border-radius: 2px; display: block; margin-left: auto;
  }
  #debug-panel button:hover { background: rgba(255,255,255,0.15); }

  #warning-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 60;
    background: radial-gradient(ellipse at center, rgba(180,0,0,0) 60%, rgba(180,0,0,0.35) 100%);
    opacity: 0; transition: opacity 0.4s;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
</head>
<body>

<div id="canvas-container"></div>
<div id="warning-flash"></div>

<div id="crosshair"><div class="dot" id="xhair-dot"></div></div>
<div id="reach-hint"></div>

<div id="hud">
  <span class="toolname" id="tool-name">ペイント缶</span>
  <span class="tooldesc" id="tool-desc">広くバシャッと / 射程 7m</span><br>
  彩色: <span id="paint-pct">0</span>%<br>
  高度: <span id="altitude">2</span>m <span id="sky-ready" style="color:#aee2ff; display:none;">― 空に手が届く</span>
</div>

<div id="toolbar">
  <div class="tool-wrap">
    <div class="tool-slot active" id="slot-can">🪣</div>
    <div class="tool-cap">広く塗る<br>射程 7m</div>
  </div>
  <div class="tool-wrap">
    <div class="tool-slot" id="slot-brush">🖌️</div>
    <div class="tool-cap">細く濃く<br>射程 4.5m</div>
  </div>
</div>

<div id="debug-panel">
  次の来訪まで: <span id="hand-timer">--:--</span>
  <button id="debug-spawn">[デバッグ] 今すぐ手を呼ぶ</button>
</div>

<div id="overlay">
  <h1>Monochrome Bloom</h1>
  <p>色のない花畑に、あなたは絵具を持って立っている。</p>
  <p><span class="key">W A S D</span> 移動、<span class="key">MOUSE</span> 視点、<span class="key">クリック</span> 色を塗る、<span class="key">1 / 2</span> 道具切替</p>
  <p>色は近くのものにしか届かない。歩いて、登って、世界を塗ろう。</p>
  <p>空を塗りたければ、高い山の頂へ。山頂の上昇気流の中で <span class="key">SPACE</span> ― 空を飛べる。</p>
  <p style="color:#777; margin-top:14px;">時々、空の裂け目から色を消しに何かがやってくる――</p>
  <div class="start">クリックして世界に入る</div>
</div>

<script>
// Three.js r128 is loaded globally above (works under file:// unlike ES modules).

// ============================================================
// SETUP
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 1.7, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composerResize();
});

// Seeded RNG for stable procedural layout across reloads
function makeRng(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}
const rng = makeRng(20260630);

// ============================================================
// LIGHTING — built for monochrome tonal range (overcast film look)
// ============================================================
const hemi = new THREE.HemisphereLight(0xcfcfcf, 0x2a2a2a, 0.9);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xf5f3ee, 1.15);
sun.position.set(-18, 22, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -40;
sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40;
sun.shadow.camera.bottom = -40;
sun.shadow.camera.far = 100;
sun.shadow.bias = -0.0015;
scene.add(sun);

const fillLight = new THREE.DirectionalLight(0x9aa0a8, 0.25);
fillLight.position.set(15, 8, -10);
scene.add(fillLight);

// Fog for depth + photographic atmosphere
scene.fog = new THREE.FogExp2(0xb8b8b4, 0.018);

// Sky gradient (canvas-based, tinted as the player paints the sky)
function makeSkyTexture(grayTop, grayBottom) {
  const c = document.createElement('canvas');
  c.width = 2; c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, grayTop);
  grad.addColorStop(1, grayBottom);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 2, 256);
  return new THREE.CanvasTexture(c);
}
const skyGeo = new THREE.SphereGeometry(220, 24, 16);
const skyMat = new THREE.MeshBasicMaterial({
  map: makeSkyTexture('#d9d9d5', '#9a9a96'),
  side: THREE.BackSide, fog: false
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ============================================================
// TERRAIN SHAPE — rolling field + one tall climbable mountain
// ============================================================
const groundSize = 140;
const MOUNTAIN = { x: 40, z: -36, height: 21, spread: 210 };

function terrainHeight(x, z) {
  let h = Math.sin(x * 0.045) * 1.4 + Math.cos(z * 0.06) * 1.1 + Math.sin((x + z) * 0.03) * 0.6;
  const dx = x - MOUNTAIN.x, dz = z - MOUNTAIN.z;
  h += MOUNTAIN.height * Math.exp(-(dx * dx + dz * dz) / MOUNTAIN.spread);
  return h;
}
const summitY = terrainHeight(MOUNTAIN.x, MOUNTAIN.z);
const SKY_MIN_PAINT_HEIGHT = 13; // camera must be at least this high to paint the sky

// ============================================================
// LOCAL PAINT MASK — a canvas texture over the whole field.
// White = painted (colored), black = monochrome. Ground and grass
// read it in their shaders, so only the spots you actually painted
// bloom into color. This is what makes walking around matter.
// ============================================================
const MASK_SIZE = 512;
const paintMaskCanvas = document.createElement('canvas');
paintMaskCanvas.width = paintMaskCanvas.height = MASK_SIZE;
const paintMaskCtx = paintMaskCanvas.getContext('2d');
paintMaskCtx.fillStyle = '#000';
paintMaskCtx.fillRect(0, 0, MASK_SIZE, MASK_SIZE);
const paintMaskTex = new THREE.CanvasTexture(paintMaskCanvas);
paintMaskTex.flipY = false;

function worldToMask(x, z) {
  return {
    u: (x / groundSize + 0.5) * MASK_SIZE,
    v: (z / groundSize + 0.5) * MASK_SIZE,
  };
}

function paintGroundAt(x, z, radius, alpha) {
  const { u, v } = worldToMask(x, z);
  const r = Math.max(2, radius / groundSize * MASK_SIZE);
  const grad = paintMaskCtx.createRadialGradient(u, v, 0, u, v, r);
  grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  paintMaskCtx.globalCompositeOperation = 'lighter';
  paintMaskCtx.fillStyle = grad;
  paintMaskCtx.beginPath();
  paintMaskCtx.arc(u, v, r, 0, Math.PI * 2);
  paintMaskCtx.fill();
  paintMaskTex.needsUpdate = true;
}

function eraseGroundAt(x, z, radius) {
  const { u, v } = worldToMask(x, z);
  const r = Math.max(2, radius / groundSize * MASK_SIZE);
  const grad = paintMaskCtx.createRadialGradient(u, v, 0, u, v, r);
  grad.addColorStop(0, 'rgb(243,243,243)'); // multiply: center drains fastest
  grad.addColorStop(1, 'rgb(255,255,255)'); // edge: no-op
  paintMaskCtx.globalCompositeOperation = 'multiply';
  paintMaskCtx.fillStyle = grad;
  paintMaskCtx.beginPath();
  paintMaskCtx.arc(u, v, r, 0, Math.PI * 2);
  paintMaskCtx.fill();
  paintMaskCtx.globalCompositeOperation = 'source-over';
  paintMaskTex.needsUpdate = true;
}

// average painted level of the mask (throttled — samples a 16x16 downscale)
const avgCanvas = document.createElement('canvas');
avgCanvas.width = avgCanvas.height = 16;
const avgCtx = avgCanvas.getContext('2d');
let groundAvgCache = 0, lastGroundAvgTime = -10000;
function groundMaskAverage() {
  const now = performance.now();
  if (now - lastGroundAvgTime < 600) return groundAvgCache;
  lastGroundAvgTime = now;
  avgCtx.drawImage(paintMaskCanvas, 0, 0, 16, 16);
  const d = avgCtx.getImageData(0, 0, 16, 16).data;
  let s = 0;
  for (let i = 0; i < d.length; i += 4) s += d[i];
  groundAvgCache = s / (256 * 255);
  return groundAvgCache;
}

// Injects the mask lookup into a MeshStandardMaterial: pixels start at
// their luminance (gray) and blend to full color where the mask is white.
function addGroundMaskShader(mat) {
  mat.onBeforeCompile = (shader) => {
    shader.uniforms.paintMask = { value: paintMaskTex };
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>', '#include <common>\nvarying vec2 vMaskUv;')
      .replace('#include <begin_vertex>', `#include <begin_vertex>
        vec3 maskPos = transformed;
        #ifdef USE_INSTANCING
          maskPos = (instanceMatrix * vec4(maskPos, 1.0)).xyz;
        #endif
        vec4 maskWorld = modelMatrix * vec4(maskPos, 1.0);
        vMaskUv = maskWorld.xz / ${groundSize}.0 + 0.5;`);
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>', '#include <common>\nuniform sampler2D paintMask;\nvarying vec2 vMaskUv;')
      .replace('#include <color_fragment>', `#include <color_fragment>
        {
          float maskVal = texture2D(paintMask, vMaskUv).r;
          float grayVal = dot(diffuseColor.rgb, vec3(0.299, 0.587, 0.114));
          diffuseColor.rgb = mix(vec3(grayVal), diffuseColor.rgb, maskVal);
        }`);
  };
}

// ============================================================
// MONOCHROME <-> COLOR MATERIALS for discrete objects
// (flowers / trees / hills each carry a saturation level)
// ============================================================
function desaturate(color, amount) {
  // amount: 1 = fully gray, 0 = full color
  const hsl = {};
  color.getHSL(hsl);
  const c = new THREE.Color();
  c.setHSL(hsl.h, hsl.s * (1 - amount), hsl.l);
  return c;
}

function createPaintableMaterial(baseColorHex, roughness = 0.85) {
  const baseColor = new THREE.Color(baseColorHex);
  const mat = new THREE.MeshStandardMaterial({
    color: desaturate(baseColor, 1.0),
    roughness, metalness: 0.0,
  });
  mat.userData.baseColor = baseColor;
  mat.userData.saturationLevel = 0.0; // 0 = gray, 1 = full color
  return mat;
}

function bumpMaterial(mat, amount) {
  mat.userData.saturationLevel = Math.min(1, mat.userData.saturationLevel + amount);
  mat.color.copy(desaturate(mat.userData.baseColor, 1 - mat.userData.saturationLevel));
}

function drainMaterial(mat, amount) {
  mat.userData.saturationLevel = Math.max(0, mat.userData.saturationLevel - amount);
  mat.color.copy(desaturate(mat.userData.baseColor, 1 - mat.userData.saturationLevel));
}

// ============================================================
// TERRAIN MESH
// ============================================================
const groundSeg = 110;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, groundSeg, groundSeg);
groundGeo.rotateX(-Math.PI / 2);
const posAttr = groundGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  posAttr.setY(i, terrainHeight(posAttr.getX(i), posAttr.getZ(i)));
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({ color: '#4f7d3a', roughness: 0.95, metalness: 0.0 });
addGroundMaskShader(groundMat);
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// FLOWERS — individual paintable materials, clustered on the field
// ============================================================
const flowerPalette = [
  '#e0507a', '#f2c14e', '#7badd8', '#c97fd1', '#f08a4b', '#ffffff', '#d65a5a'
];
const flowerGroup = new THREE.Group();
scene.add(flowerGroup);

const petalGeo = new THREE.SphereGeometry(0.16, 6, 5);
const stemGeo = new THREE.CylinderGeometry(0.02, 0.03, 0.55, 4);
const centerGeo = new THREE.SphereGeometry(0.07, 6, 5);

const FLOWER_COUNT = 260;
for (let i = 0; i < FLOWER_COUNT; i++) {
  const x = (rng() - 0.5) * groundSize * 0.92;
  const z = (rng() - 0.5) * groundSize * 0.92;
  if (x * x + z * z < 9) continue; // keep spawn area clear
  const y = terrainHeight(x, z);
  if (y > 8) continue; // keep the mountain's upper slopes bare

  const colorHex = flowerPalette[Math.floor(rng() * flowerPalette.length)];
  const flowerMat = createPaintableMaterial(colorHex, 0.6);
  const stemMat = createPaintableMaterial('#3c6b2a', 0.95);

  const flower = new THREE.Group();
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = 0.27;
  stem.castShadow = true;
  flower.add(stem);

  const petalCount = 5;
  for (let p = 0; p < petalCount; p++) {
    const ang = (p / petalCount) * Math.PI * 2;
    const petal = new THREE.Mesh(petalGeo, flowerMat);
    petal.position.set(Math.cos(ang) * 0.16, 0.55, Math.sin(ang) * 0.16);
    petal.scale.set(1, 0.55, 0.7);
    petal.castShadow = true;
    flower.add(petal);
  }
  const center = new THREE.Mesh(centerGeo, createPaintableMaterial('#f2d33b', 0.5));
  center.position.y = 0.55;
  flower.add(center);

  const scale = 1.0 + rng() * 0.9;
  flower.scale.setScalar(scale);
  flower.position.set(x, y, z);
  flower.rotation.y = rng() * Math.PI * 2;

  flowerGroup.add(flower);
}

// ============================================================
// GRASS — instanced blades, colored locally via the paint mask
// ============================================================
const grassMat = new THREE.MeshStandardMaterial({ color: '#5c8f42', roughness: 0.95, metalness: 0.0 });
grassMat.side = THREE.DoubleSide;
addGroundMaskShader(grassMat);
const bladeGeo = new THREE.PlaneGeometry(0.05, 0.4);
bladeGeo.translate(0, 0.2, 0);
const GRASS_COUNT = 4000;
const grassMesh = new THREE.InstancedMesh(bladeGeo, grassMat, GRASS_COUNT);
grassMesh.castShadow = false;
grassMesh.receiveShadow = false;
const dummy = new THREE.Object3D();
for (let i = 0; i < GRASS_COUNT; i++) {
  const x = (rng() - 0.5) * groundSize * 0.95;
  const z = (rng() - 0.5) * groundSize * 0.95;
  const y = terrainHeight(x, z);
  dummy.position.set(x, y, z);
  dummy.rotation.y = rng() * Math.PI;
  const s = y > 9 ? 0.001 : 0.6 + rng() * 0.9; // no grass on the bare peak
  dummy.scale.set(s, s, s);
  dummy.updateMatrix();
  grassMesh.setMatrixAt(i, dummy.matrix);
}
scene.add(grassMesh);

// ============================================================
// DISTANT SILHOUETTES — hills & trees for depth
// ============================================================
const hillMeshes = [];
for (let i = 0; i < 7; i++) {
  const ang = (i / 7) * Math.PI * 2;
  const dist = 55 + rng() * 20;
  const hillGeo = new THREE.SphereGeometry(14 + rng() * 10, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
  const hillMatIndiv = createPaintableMaterial('#5a7a52', 1.0);
  const hill = new THREE.Mesh(hillGeo, hillMatIndiv);
  hill.position.set(Math.cos(ang) * dist, -3, Math.sin(ang) * dist);
  hill.scale.y = 0.5;
  scene.add(hill);
  hillMeshes.push(hill);
}

const trunkGeo = new THREE.CylinderGeometry(0.25, 0.4, 4, 6);
const leafGeo = new THREE.ConeGeometry(2.2, 4.5, 8);
const treeMeshes = [];
for (let i = 0; i < 24; i++) {
  const ang = rng() * Math.PI * 2;
  const dist = 35 + rng() * 30;
  const x = Math.cos(ang) * dist, z = Math.sin(ang) * dist;
  const y = terrainHeight(x, z);
  if (y > 8) continue; // not on the mountain's upper slopes
  const trunkMatIndiv = createPaintableMaterial('#5b4226', 1.0);
  const leafMatIndiv = createPaintableMaterial('#3e6b34', 0.9);
  const trunk = new THREE.Mesh(trunkGeo, trunkMatIndiv);
  trunk.position.set(x, y + 2, z);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(leafGeo, leafMatIndiv);
  leaves.position.set(x, y + 5.2, z);
  leaves.castShadow = true;
  scene.add(leaves);
  treeMeshes.push(trunk, leaves);
}

// ============================================================
// SKY PAINT STATE — the sky is only reachable from high altitude
// ============================================================
const skyPaintState = { saturationLevel: 0 };
let skyDirty = false, skyBuildTimer = 1;
function applySkyColor() { skyDirty = true; }
function buildSkyTexture() {
  const topGray = 217, bottomGray = 154;
  const topColor = new THREE.Color('#aee2ff');
  const bottomColor = new THREE.Color('#fcd9a0');
  const grayTop = new THREE.Color(topGray / 255, topGray / 255, topGray / 255 * 0.98);
  const grayBottom = new THREE.Color(bottomGray / 255 * 1.01, bottomGray / 255, bottomGray / 255 * 0.97);
  const mixTop = grayTop.clone().lerp(topColor, skyPaintState.saturationLevel);
  const mixBottom = grayBottom.clone().lerp(bottomColor, skyPaintState.saturationLevel);
  if (sky.material.map) sky.material.map.dispose();
  sky.material.map = makeSkyTexture('#' + mixTop.getHexString(), '#' + mixBottom.getHexString());
  sky.material.map.needsUpdate = true;
}

// ============================================================
// UPDRAFT — a wind column at the mountain summit that lets you fly
// ============================================================
const UPDRAFT = { x: MOUNTAIN.x, z: MOUNTAIN.z, radius: 4.5, top: 50 };
const updraftGroup = new THREE.Group();
updraftGroup.position.set(UPDRAFT.x, summitY, UPDRAFT.z);
scene.add(updraftGroup);

const beamGeo = new THREE.CylinderGeometry(4.2, 3.0, 46, 16, 1, true);
const beamMat = new THREE.MeshBasicMaterial({
  color: '#ffffff', transparent: true, opacity: 0.06,
  side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  depthWrite: false, fog: false // visible from afar as a landmark
});
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.y = 23;
updraftGroup.add(beam);

const windParticles = [];
const windGeo = new THREE.SphereGeometry(0.09, 5, 4);
const windMat = new THREE.MeshBasicMaterial({
  color: '#ffffff', transparent: true, opacity: 0.45,
  blending: THREE.AdditiveBlending, depthWrite: false
});
for (let i = 0; i < 28; i++) {
  const p = new THREE.Mesh(windGeo, windMat);
  const a = rng() * Math.PI * 2, r = rng() * 3.6;
  p.userData = { angle: a, radius: r, speed: 4 + rng() * 5, spin: 0.6 + rng() * 0.8 };
  p.position.set(Math.cos(a) * r, rng() * 44, Math.sin(a) * r);
  updraftGroup.add(p);
  windParticles.push(p);
}

function updateWindParticles(dt) {
  windParticles.forEach(p => {
    p.position.y += p.userData.speed * dt;
    p.userData.angle += p.userData.spin * dt;
    p.position.x = Math.cos(p.userData.angle) * p.userData.radius;
    p.position.z = Math.sin(p.userData.angle) * p.userData.radius;
    if (p.position.y > 44) p.position.y = 0;
  });
}

// ============================================================
// FILM GRAIN + VIGNETTE POST-PROCESS
// ============================================================
const EffectComposer = THREE.EffectComposer;
const RenderPass = THREE.RenderPass;
const ShaderPass = THREE.ShaderPass;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const grainVignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    grainStrength: { value: 0.07 },
    vignetteStrength: { value: 0.55 },
    worldSaturation: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform float grainStrength;
    uniform float vignetteStrength;
    uniform float worldSaturation;
    varying vec2 vUv;

    float rand(vec2 co) {
      return fract(sin(dot(co.xy, vec2(12.9898,78.233))) * 43758.5453);
    }

    void main() {
      vec4 color = texture2D(tDiffuse, vUv);

      float contrastAmt = mix(1.18, 1.05, worldSaturation);
      color.rgb = (color.rgb - 0.5) * contrastAmt + 0.5;

      float g = (rand(vUv * vec2(1920.0, 1080.0) + time) - 0.5) * grainStrength;
      color.rgb += g;

      vec2 centered = vUv - 0.5;
      float dist = length(centered * vec2(1.0, 0.8));
      float vig = smoothstep(0.35, 0.85, dist);
      color.rgb *= 1.0 - vig * vignetteStrength;

      gl_FragColor = vec4(color.rgb, color.a);
    }
  `
};
const grainPass = new ShaderPass(grainVignetteShader);
grainPass.renderToScreen = true;
composer.addPass(grainPass);

function composerResize() {
  composer.setSize(window.innerWidth, window.innerHeight);
}

  const lockPromise = renderer.domElement.requestPointerLock();
  if (lockPromise && typeof lockPromise.catch === 'function') {

}
function enableDragFallback() {
  pointerLocked = false;

});

});

renderer.domElement.addEventListener('click', () => {
  if (gameActive && !pointerLocked) {
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('mousemove', (e) => {
  if (!gameActive) return;
  const sensitivity = 0.0022;
  if (pointerLocked) {
    playerState.yaw -= e.movementX * sensitivity;
    playerState.pitch -= e.movementY * sensitivity;
  } else if (dragLooking) {
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    playerState.yaw -= dx * sensitivity;
    playerState.pitch -= dy * sensitivity;
  }
  playerState.pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, playerState.pitch));
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') e.preventDefault();
  playerState.keys[e.code] = true;
  if (e.code === 'Digit1') setTool('can');
  if (e.code === 'Digit2') setTool('brush');
});
window.addEventListener('keyup', (e) => { playerState.keys[e.code] = false; });

function updatePlayer(dt) {
  camera.rotation.order = 'YXZ';
  camera.rotation.y = playerState.yaw;
  camera.rotation.x = playerState.pitch;

  const forward = new THREE.Vector3(Math.sin(playerState.yaw), 0, Math.cos(playerState.yaw));
  const right = new THREE.Vector3(Math.sin(playerState.yaw + Math.PI / 2), 0, Math.cos(playerState.yaw + Math.PI / 2));

  const moveDir = new THREE.Vector3();
  if (playerState.keys['KeyW']) moveDir.sub(forward);
  if (playerState.keys['KeyS']) moveDir.add(forward);
  if (playerState.keys['KeyA']) moveDir.sub(right);
  if (playerState.keys['KeyD']) moveDir.add(right);

  if (moveDir.lengthSq() > 0) {
    moveDir.normalize();
    const speed = playerState.flying ? 8.5 : 6.2;
    camera.position.x += moveDir.x * speed * dt;
    camera.position.z += moveDir.z * speed * dt;
  }

  const eyeY = terrainHeight(camera.position.x, camera.position.z) + 1.7;
  const dxu = camera.position.x - UPDRAFT.x;
  const dzu = camera.position.z - UPDRAFT.z;
  const inUpdraft = (dxu * dxu + dzu * dzu) < UPDRAFT.radius * UPDRAFT.radius
    && camera.position.y < summitY + UPDRAFT.top;

  if (inUpdraft && playerState.keys['Space']) {
    playerState.flying = true;
    playerState.vy = Math.min(playerState.vy + dt * 18, 8.5);
  }

  if (playerState.flying) {
    if (!(inUpdraft && playerState.keys['Space'])) {
      // outside the column: hold SPACE to glide, release to descend
      const gliding = playerState.keys['Space'];
      playerState.vy -= dt * (gliding ? 1.6 : 5.5);
      playerState.vy = Math.max(playerState.vy, gliding ? -1.6 : -7);
    }
    camera.position.y = Math.min(camera.position.y + playerState.vy * dt, 55);
    if (camera.position.y <= eyeY) {
      camera.position.y = eyeY;
      playerState.flying = false;
      playerState.vy = 0;
    }
  } else {
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, eyeY, Math.min(1, dt * 10));
  }

  // clamp to field bounds
  const bound = groundSize * 0.46;
  camera.position.x = Math.max(-bound, Math.min(bound, camera.position.x));
  camera.position.z = Math.max(-bound, Math.min(bound, camera.position.z));
}

const rayTargets = [ground, ...treeMeshes, ...hillMeshes, sky];

let aimFrame = 0;
function updateAimFeedback() {
  if (!gameActive) return;
  if (++aimFrame % 4 !== 0) return; // raycasting the terrain is the pricey part
  raycaster.setFromCamera(SCREEN_CENTER, camera);
  const hits = raycaster.intersectObjects(rayTargets, false);
  const tool = TOOLS[currentTool];
  xhairDot.classList.remove('inreach', 'far');
  if (!hits.length) return;
  const hit = hits[0];
  if (hit.object === sky) {
    if (camera.position.y >= SKY_MIN_PAINT_HEIGHT) {
      xhairDot.classList.add('inreach');
    } else {
      xhairDot.classList.add('far');
      showHint('空は遠すぎる ― 高い山の頂か、上昇気流に乗って近づこう');
    }
  } else if (hit.distance <= tool.reach) {
    xhairDot.classList.add('inreach');
  } else {
    xhairDot.classList.add('far');
    if (isPainting) showHint('色が届かない…もっと近づこう');
  }
}

// ============================================================
// PAINTING — short reach forces you to walk up to what you color
// ============================================================
function paintAtRay() {
  const tool = TOOLS[currentTool];
  raycaster.setFromCamera(SCREEN_CENTER, camera);
  const hits = raycaster.intersectObjects(rayTargets, false);
  if (hits.length === 0) return;
  const hit = hits[0];
  const hitPoint = hit.point;
  const hitObject = hit.object;

  // --- Sky: only paintable from high altitude (mountaintop / flight) ---
  if (hitObject === sky) {
    if (camera.position.y < SKY_MIN_PAINT_HEIGHT) return; // hint handled by aim feedback
    skyPaintState.saturationLevel = Math.min(1, skyPaintState.saturationLevel + tool.skyStrength);
    applySkyColor();
    recomputeGlobalProgress();
    return;
  }

  // --- Everything else: must be within the tool's reach ---
  if (hit.distance > tool.reach) return;

  if (hitObject === ground) {
    paintGroundAt(hitPoint.x, hitPoint.z, tool.radius, tool.groundAlpha);
  } else {
    bumpMaterial(hitObject.material, tool.matStrength * 2); // direct hit: strongest
  }

  // Flowers near the hit point soak up paint with distance falloff
  flowerGroup.children.forEach(flower => {
    const d = flower.position.distanceTo(new THREE.Vector3(hitPoint.x, flower.position.y, hitPoint.z));
    if (d < tool.radius) {
      const falloff = 1 - d / tool.radius;
      flower.children.forEach(part => {
        if (part.material && part.material.userData.baseColor) {
          bumpMaterial(part.material, tool.matStrength * falloff);
        }
      });
    }
  });

  // The can's wide splash also catches nearby trees/hills; the brush's
  // tiny radius means it basically never does — that's the tradeoff.
  [...treeMeshes, ...hillMeshes].forEach(obj => {
    if (obj === hitObject) return;
    const d = obj.position.distanceTo(hitPoint);
    if (d < tool.radius * 1.2) {
      const falloff = 1 - d / (tool.radius * 1.2);
      bumpMaterial(obj.material, tool.matStrength * falloff * 0.5);
    }
  });

  spawnSplashParticle(hitPoint, currentTool);
  recomputeGlobalProgress();
}

// little splash particles for tactile feedback when painting
function spawnSplashParticle(point, tool) {
  if (rng() > 0.6) return; // throttle
  const size = tool === 'can' ? 0.08 + rng() * 0.1 : 0.04 + rng() * 0.04;
  const spread = tool === 'can' ? 1.2 : 0.3;
  const geo = new THREE.SphereGeometry(size, 6, 6);
  const col = flowerPalette[Math.floor(rng() * flowerPalette.length)];
  const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.85 });
  const drop = new THREE.Mesh(geo, mat);
  drop.position.set(point.x + (rng() - 0.5) * spread, point.y + 0.05, point.z + (rng() - 0.5) * spread);
  scene.add(drop);
  setTimeout(() => { scene.remove(drop); geo.dispose(); mat.dispose(); }, 1200);
}

let globalProgress = 0;
function recomputeGlobalProgress() {
  let fTotal = 0, fN = 0;
  flowerGroup.children.forEach(flower => {
    flower.children.forEach(part => {
      if (part.material && part.material.userData.baseColor) {
        fTotal += part.material.userData.saturationLevel;
        fN++;
      }
    });
  });
  let oTotal = 0, oN = 0;
  [...treeMeshes, ...hillMeshes].forEach(m => { oTotal += m.material.userData.saturationLevel; oN++; });

  globalProgress =
    0.45 * groundMaskAverage() +
    0.35 * (fN ? fTotal / fN : 0) +
    0.12 * (oN ? oTotal / oN : 0) +
    0.08 * skyPaintState.saturationLevel;

  document.getElementById('paint-pct').textContent = Math.round(globalProgress * 100);
  grainPass.uniforms.worldSaturation.value = globalProgress;
}

const HAND = {
  openDur: 1.4, descendDur: 2.6, eraseDur: 9.0, returnDur: 2.2, closeDur: 1.0,
  eraseRadius: 10, roamRadius: 4.5,
};
const handState = {
  mode: 'idle', t: 0,
  riftPos: new THREE.Vector3(),
  targetPos: new THREE.Vector3(),
  returnFrom: new THREE.Vector3(),
  roamAngle: 0,
};

function triggerHandEvent() {
  if (handState.mode !== 'idle') return;
  const a = rng() * Math.PI * 2;
  handState.riftPos.set(camera.position.x + Math.cos(a) * 32, 46, camera.position.z + Math.sin(a) * 32);
  handState.targetPos.set(camera.position.x + (rng() - 0.5) * 8, 4.2, camera.position.z + (rng() - 0.5) * 8);
  handState.roamAngle = rng() * Math.PI * 2;
  riftGroup.position.copy(handState.riftPos);
  riftGroup.lookAt(camera.position);
  riftGroup.visible = true;
  riftGroup.scale.setScalar(0.01);
  handState.mode = 'opening';
  handState.t = 0;
  flashWarning();
}

function flashWarning() {
  const el = document.getElementById('warning-flash');
  let count = 0;
  const blink = () => {
    el.style.opacity = count % 2 === 0 ? '1' : '0';
    count++;
    if (count < 6) setTimeout(blink, 220);
  };
  blink();
}

const easeInOut = p => p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
const easeOut = p => 1 - Math.pow(1 - p, 3);

// Colored drain particles: color flies OUT of the world INTO the hand,
// desaturating along the way — the "being absorbed" moment.
const drainParticles = [];
const drainGeo = new THREE.SphereGeometry(0.16, 6, 5);

function spawnDrainParticle() {
  if (drainParticles.length > 70) return;
  const col = new THREE.Color(flowerPalette[Math.floor(rng() * flowerPalette.length)]);
  const mat = new THREE.MeshBasicMaterial({ color: col.clone(), transparent: true, opacity: 0.9 });
  const p = new THREE.Mesh(drainGeo, mat);
  const a = rng() * Math.PI * 2, r = 3 + rng() * (HAND.eraseRadius - 2);
  const x = handGroup.position.x + Math.cos(a) * r;
  const z = handGroup.position.z + Math.sin(a) * r;
  p.position.set(x, terrainHeight(x, z) + 0.3 + rng() * 2.5, z);
  p.userData = {
    from: p.position.clone(),
    t: 0,
    dur: 0.8 + rng() * 0.6,
    baseColor: col,
  };
  scene.add(p);
  drainParticles.push(p);
}

function updateDrainParticles(dt) {
  for (let i = drainParticles.length - 1; i >= 0; i--) {
    const p = drainParticles[i];
    p.userData.t += dt;
    const k = Math.min(1, p.userData.t / p.userData.dur);
    p.position.lerpVectors(p.userData.from, handGroup.position, k * k); // accelerates into the palm
    p.material.color.copy(desaturate(p.userData.baseColor, k)); // color fades to gray as it's absorbed
    p.material.opacity = 0.9 * (1 - k * 0.55);
    p.scale.setScalar(1 - 0.6 * k);
    if (k >= 1) {
      scene.remove(p);
      p.material.dispose();
      drainParticles.splice(i, 1);
    }
  }
}

function applyHandErase(dt) {
  const erasePoint = handGroup.position;
  const eraseStrength = dt * 0.9;

  if (Math.random() < 0.55) spawnDrainParticle();

  // Ground & grass: a gray stain spreads under the hand on the paint mask
  eraseGroundAt(erasePoint.x, erasePoint.z, HAND.eraseRadius);

  // Flowers
  flowerGroup.children.forEach(flower => {
    const d = flower.position.distanceTo(new THREE.Vector3(erasePoint.x, flower.position.y, erasePoint.z));
    if (d < HAND.eraseRadius) {
      const falloff = 1 - d / HAND.eraseRadius;
      flower.children.forEach(part => {
        if (part.material && part.material.userData.baseColor) {
          drainMaterial(part.material, eraseStrength * falloff);
        }
      });
    }
  });

  // Trees & hills
  [...treeMeshes, ...hillMeshes].forEach(obj => {
    const d = obj.position.distanceTo(erasePoint);
    if (d < HAND.eraseRadius * 1.5) {
      const falloff = 1 - d / (HAND.eraseRadius * 1.5);
      drainMaterial(obj.material, eraseStrength * falloff * 0.7);
    }
  });

  // Sky drains too
  if (skyPaintState.saturationLevel > 0) {
    skyPaintState.saturationLevel = Math.max(0, skyPaintState.saturationLevel - dt * 0.12);
    applySkyColor();
  }
}

function updateHand(dt) {
  if (handState.mode === 'idle') return;
  handState.t += dt;
  const t = handState.t;

  // rift ring slowly rotates + pulses whenever visible
  if (riftGroup.visible) {
    riftRing.rotation.z += dt * 0.8;
    riftGlow.scale.setScalar(1 + Math.sin(t * 5) * 0.06);
  }

  switch (handState.mode) {
    case 'opening': {
      const k = Math.min(1, t / HAND.openDur);
      riftGroup.scale.setScalar(0.01 + easeOut(k) * 0.99);
      if (k >= 1) {
        handState.mode = 'descend'; handState.t = 0;
        handGroup.visible = true;
        handGroup.position.copy(handState.riftPos);
        handGroup.scale.setScalar(1.0);
      }
      break;
    }
    case 'descend': {
      const k = Math.min(1, t / HAND.descendDur);
      const e = easeInOut(k);
      handGroup.position.lerpVectors(handState.riftPos, handState.targetPos, e);
      handGroup.scale.setScalar(1.0 + e * 1.6); // grows as it pushes through the gap
      handGroup.lookAt(camera.position.x, handGroup.position.y, camera.position.z);
      if (k >= 1) { handState.mode = 'erase'; handState.t = 0; }
      break;
    }
    case 'erase': {
      handState.roamAngle += dt * 0.55;
      handGroup.position.set(
        handState.targetPos.x + Math.cos(handState.roamAngle) * HAND.roamRadius,
        handState.targetPos.y + Math.sin(t * 2) * 0.8,
        handState.targetPos.z + Math.sin(handState.roamAngle) * HAND.roamRadius
      );
      handGroup.lookAt(camera.position.x, handGroup.position.y, camera.position.z);
      handGroup.rotation.x += Math.sin(t * 6) * 0.05;
      applyHandErase(dt);
      if (t >= HAND.eraseDur) {
        handState.mode = 'return'; handState.t = 0;
        handState.returnFrom.copy(handGroup.position);
      }
      break;
    }
    case 'return': {
      const k = Math.min(1, t / HAND.returnDur);
      const e = easeInOut(k);
      handGroup.position.lerpVectors(handState.returnFrom, handState.riftPos, e);
      handGroup.scale.setScalar(2.6 - e * 1.6);
      if (k >= 1) {
        handState.mode = 'closing'; handState.t = 0;
        handGroup.visible = false;
      }
      break;
    }
    case 'closing': {
      const k = Math.min(1, t / HAND.closeDur);
      riftGroup.scale.setScalar(Math.max(0.01, 1 - easeOut(k)));
      if (k >= 1) {
        riftGroup.visible = false;
        handState.mode = 'idle';
        recomputeGlobalProgress();
      }
      break;
    }
  }
}

// ============================================================
// PLAYTIME-BASED SPAWN TIMER (60–90 min active play, debug override)
// ============================================================
let nextHandDelay = (60 + rng() * 30) * 60; // seconds
let timeSinceLastHand = 0;

document.getElementById('debug-spawn').addEventListener('click', () => {
  triggerHandEvent();
  timeSinceLastHand = 0;
  nextHandDelay = (60 + rng() * 30) * 60;
});

function formatTime(sec) {
  sec = Math.max(0, sec);
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateHandTimer(dt) {
  if (!gameActive) return; // only counts "active play" time
  timeSinceLastHand += dt;
  document.getElementById('hand-timer').textContent = formatTime(nextHandDelay - timeSinceLastHand);
  if (timeSinceLastHand >= nextHandDelay && handState.mode === 'idle') {
    triggerHandEvent();
    timeSinceLastHand = 0;
    nextHandDelay = (60 + rng() * 30) * 60;
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
const altitudeEl = document.getElementById('altitude');
const skyReadyEl = document.getElementById('sky-ready');
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());

  if (gameActive) {
    updatePlayer(dt);
    if (isPainting) paintAtRay();
    updateToolViewmodel(dt);
    updateAimFeedback();
    altitudeEl.textContent = Math.round(camera.position.y);
    skyReadyEl.style.display = camera.position.y >= SKY_MIN_PAINT_HEIGHT ? 'inline' : 'none';
  }
  updateHand(dt);
  updateDrainParticles(dt);
  updateWindParticles(dt);
  updateHandTimer(dt);

  // throttled sky texture rebuild (painting/draining marks it dirty)
  skyBuildTimer += dt;
  if (skyDirty && skyBuildTimer > 0.12) {
    buildSkyTexture();
    skyDirty = false;
    skyBuildTimer = 0;
  }

  grainPass.uniforms.time.value += dt * 4.0;

  composer.render();
}
animate();
</script>
